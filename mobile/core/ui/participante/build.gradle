plugins {
    id 'com.android.library'
}

android {
    namespace 'com.example.participante'
    compileSdk 34

    defaultConfig {
        //applicationId "com.example.participante"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {

    implementation project (':core:util:utilList')
    implementation project(path: ':core:database')
    implementation project(path: ':core:database')
    implementation project(path: ':core:model')
    implementation project(path: ':core:ui:interfazinsertar')
    implementation project(path: ':core:ui:datos')
    implementation project(path: ':core:util:retroceso')
    implementation project(path: ':core:util:retroceso')
    implementation project(path: ':core:util:cache')
    implementation project(path: ':core:util:cache')
    implementation project(path: ':core:util:user')
    implementation project(path: ':feature:enviodatos')

    constraints{
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.0"){
            because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib")
        }
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.0"){
            because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib")
        }
    }
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}