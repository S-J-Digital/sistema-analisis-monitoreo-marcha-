spring:
  application:
    name: microservicio-sennal
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  config:
    import: ""

eureka:
  client:
    enabled: false

logging:
  level:
    org.springframework.web: WARN
