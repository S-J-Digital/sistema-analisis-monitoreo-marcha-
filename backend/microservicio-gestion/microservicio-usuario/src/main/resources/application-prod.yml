spring:
  application:
    name: microservicio-usuario
  datasource:
    url: jdbc:postgresql://${DB_HOST:?Variable DB_HOST es OBLIGATORIA}:${DB_PORT:?Variable DB_PORT es OBLIGATORIA}/${DB_NAME:?Variable DB_NAME es OBLIGATORIA}
    username: ${DB_USER:?Variable DB_USER es OBLIGATORIA}
    password: ${DB_PASSWORD:?Variable DB_PASSWORD es OBLIGATORIA}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 600000
  jpa:
    format-sql: true
    show-sql: false
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  config:
    import: ${SPRING_CONFIG_URL:?Variable SPRING_CONFIG_URL es OBLIGATORIA}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: ${SPRING_EUREKA_URL:?Variable SPRING_EUREKA_URL es OBLIGATORIA}
    enabled: ${EUREKA_ENABLED:?Variable EUREKA_ENABLED es OBLIGATORIA}

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
